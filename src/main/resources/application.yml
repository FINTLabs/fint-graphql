fint:
  endpoint:
    root: https://play-with-fint.felleskomponent.no
  webclient:
    connect-timeout-ms: 4000
    response-timeout: PT4S
    connection-provider:
      maxConnections: 300
      maxInFlightRequests: 300
      acquireTimeout: 2000
      acquireMaxCount: 3000
      maxIdleTime: PT30S
      maxLifeTime: PT90S
  graphql:
    async-request-timeout: PT1M55S
    query-timeout: PT1M50S

graphql:
  servlet:
    exception-handlers-enabled: true
    async:
      enabled: true

server:
  forward-headers-strategy: framework

spring:
  threads:
    virtual:
      enabled: true

logging:
  level:
    no.fint.graphql: INFO
